<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="256" height="256" shape-rendering="crispEdges">
  <!-- Background -->
  <rect width="48" height="48" fill="#2C2F33"/>

  <!-- Git branch tree (subtle background) -->
  <g fill="#57F287" opacity="0.2">
    <!-- Trunk above body -->
    <rect x="23" y="0" width="2" height="11"/>
    <!-- Trunk below body -->
    <rect x="23" y="31" width="2" height="17"/>
    <!-- Left branch diagonal -->
    <rect x="22" y="5" width="1" height="1"/>
    <rect x="21" y="6" width="1" height="1"/>
    <rect x="20" y="7" width="1" height="1"/>
    <rect x="19" y="8" width="1" height="1"/>
    <rect x="18" y="9" width="1" height="1"/>
    <!-- Left branch vertical -->
    <rect x="17" y="10" width="2" height="38"/>
    <!-- Right branch diagonal -->
    <rect x="25" y="5" width="1" height="1"/>
    <rect x="26" y="6" width="1" height="1"/>
    <rect x="27" y="7" width="1" height="1"/>
    <rect x="28" y="8" width="1" height="1"/>
    <rect x="29" y="9" width="1" height="1"/>
    <!-- Right branch vertical -->
    <rect x="29" y="10" width="2" height="38"/>
  </g>

  <!-- Commit nodes -->
  <g fill="#57F287" opacity="0.35">
    <rect x="22" y="1" width="4" height="3" rx="1"/>
    <rect x="16" y="34" width="4" height="3" rx="1"/>
    <rect x="28" y="34" width="4" height="3" rx="1"/>
    <rect x="22" y="40" width="4" height="3" rx="1"/>
    <rect x="16" y="44" width="4" height="3" rx="1"/>
    <rect x="28" y="44" width="4" height="3" rx="1"/>
  </g>

  <!-- Clyde body -->
  <g fill="#5865F2">
    <rect x="20" y="12" width="8" height="1"/>
    <rect x="18" y="13" width="12" height="1"/>
    <rect x="17" y="14" width="14" height="1"/>
    <rect x="16" y="15" width="16" height="1"/>
    <rect x="15" y="16" width="18" height="10"/>
    <rect x="16" y="26" width="16" height="1"/>
    <rect x="17" y="27" width="14" height="1"/>
    <rect x="18" y="28" width="12" height="1"/>
    <rect x="20" y="29" width="8" height="1"/>
  </g>

  <!-- Body shading (bottom curve) -->
  <g fill="#4752C4">
    <rect x="16" y="26" width="16" height="1"/>
    <rect x="17" y="27" width="14" height="1"/>
    <rect x="18" y="28" width="12" height="1"/>
    <rect x="20" y="29" width="8" height="1"/>
  </g>

  <!-- Eyes -->
  <g fill="#FFFFFF">
    <rect x="18" y="17" width="5" height="5"/>
    <rect x="25" y="17" width="5" height="5"/>
  </g>

  <!-- Pupils -->
  <g fill="#23272A">
    <rect x="20" y="18" width="2" height="3"/>
    <rect x="26" y="18" width="2" height="3"/>
  </g>

  <!-- Mouth -->
  <g fill="#4752C4">
    <rect x="21" y="23" width="6" height="1"/>
  </g>

  <!-- Left arm -->
  <g fill="#99AAB5">
    <rect x="8" y="19" width="7" height="4"/>
  </g>
  <g fill="#4F5660">
    <rect x="11" y="19" width="1" height="4"/>
    <rect x="14" y="19" width="1" height="4"/>
  </g>

  <!-- Right arm -->
  <g fill="#99AAB5">
    <rect x="33" y="19" width="7" height="4"/>
  </g>
  <g fill="#4F5660">
    <rect x="33" y="19" width="1" height="4"/>
    <rect x="36" y="19" width="1" height="4"/>
  </g>

  <!-- Left claw -->
  <g fill="#F59E0B">
    <!-- Palm -->
    <rect x="5" y="19" width="3" height="4"/>
    <!-- Top prong -->
    <rect x="4" y="18" width="2" height="1"/>
    <rect x="3" y="17" width="2" height="1"/>
    <rect x="2" y="16" width="2" height="1"/>
    <!-- Middle prong -->
    <rect x="2" y="20" width="3" height="2"/>
    <!-- Bottom prong -->
    <rect x="4" y="23" width="2" height="1"/>
    <rect x="3" y="24" width="2" height="1"/>
    <rect x="2" y="25" width="2" height="1"/>
  </g>

  <!-- Right claw -->
  <g fill="#F59E0B">
    <!-- Palm -->
    <rect x="40" y="19" width="3" height="4"/>
    <!-- Top prong -->
    <rect x="42" y="18" width="2" height="1"/>
    <rect x="43" y="17" width="2" height="1"/>
    <rect x="44" y="16" width="2" height="1"/>
    <!-- Middle prong -->
    <rect x="43" y="20" width="3" height="2"/>
    <!-- Bottom prong -->
    <rect x="42" y="23" width="2" height="1"/>
    <rect x="43" y="24" width="2" height="1"/>
    <rect x="44" y="25" width="2" height="1"/>
  </g>

  <!-- Claw tips (glow) -->
  <g fill="#FCD34D">
    <rect x="2" y="16" width="1" height="1"/>
    <rect x="2" y="20" width="1" height="2"/>
    <rect x="2" y="25" width="1" height="1"/>
    <rect x="45" y="16" width="1" height="1"/>
    <rect x="45" y="20" width="1" height="2"/>
    <rect x="45" y="25" width="1" height="1"/>
  </g>
</svg>
